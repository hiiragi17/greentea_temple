name: CI

on:
  push:
    branches: [main]
  pull_request:

# GITHUB_TOKEN は lint / test に必要な read-only のみに絞る
permissions:
  contents: read

# 同一ブランチで連続 push した場合、古い実行をキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop --parallel

  rspec:
    name: RSpec (request / model / helper)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/greentea_temple_test

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      # db:prepare は seed まで走り、seed の geocoding 依存で CI が落ちるため
      # テスト用にスキーマだけを読み込む（テストは FactoryBot を使うので seed 不要）
      - name: Set up database
        run: bundle exec rails db:create db:schema:load

      # spec/system は専用ジョブ（system）で実行するため、ここでは除外する
      - name: Run RSpec
        run: bundle exec rspec --exclude-pattern "spec/system/**/*_spec.rb"

  system:
    name: RSpec (system)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/greentea_temple_test

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18
          cache: yarn

      # system spec はビュー描画に jsbundling / cssbundling のビルド成果物
      # （app/assets/builds）を必要とするため、JS / CSS をビルドしておく
      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build assets
        run: |
          yarn build
          yarn build:css

      # Chrome 本体をセットアップする。chromedriver は selenium-webdriver 4.11+ の
      # Selenium Manager が自動解決するため、別途インストールは不要（#134）
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1.7.3
        with:
          chrome-version: stable

      - name: Set up database
        run: bundle exec rails db:create db:schema:load

      - name: Run system spec
        run: bundle exec rspec spec/system
