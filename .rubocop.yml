# This file overrides https://github.com/bbatsov/rubocop/blob/master/config/default.yml
require: rubocop-rails

AllCops:
  # RuboCop 1.36 は Ruby 3.3 を解釈できないため、サポート上限の 3.2 を明示する。
  # （未設定だと .ruby-version の 3.3 を読んでエラーになる。rubocop 本体の更新は別タスク）
  TargetRubyVersion: 3.2
  Exclude:
    - 'vendor/**/*'
    - 'db/**/*'
    - 'bin/**/*'
    - 'node_modules/**/*'
    - 'Gemfile'
    - 'config/**/*'
    - 'config.ru'
    - 'db/schema.rb'
    - 'db/seeds.rb'
    - 'Gemfile'
  DisplayCopNames: true

Layout/MultilineBlockLayout:
  Exclude:
    - 'spec/**/*_spec.rb'

Layout/LineLength:
  Enabled: false

# 既存コードは明示記法（key: value）で統一しているため、短縮記法を強制しない
Style/HashSyntax:
  EnforcedShorthandSyntax: either

Metrics/AbcSize:
  Max: 25

Metrics/BlockLength:
  Max: 30
  Exclude:
    - 'Gemfile'
    - 'config/**/*'
    - 'spec/**/*_spec.rb'
    - 'spec/**/*'

Metrics/ClassLength:
  CountComments: false
  Max: 300

Metrics/CyclomaticComplexity:
  Max: 30

Metrics/MethodLength:
  CountComments: false
  Max: 30

Naming/AccessorMethodName:
  Exclude:
    - 'app/controllers/**/*'

Style/AsciiComments:
  Enabled: false

Style/BlockDelimiters:
  Exclude:
    - 'spec/**/*_spec.rb'

Style/ClassAndModuleChildren:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/WhileUntilModifier:
  Enabled: false

Style/HashEachMethods:
  Enabled: false

Style/HashTransformKeys:
  Enabled: false

Style/HashTransformValues:
  Enabled: false

Bundler/OrderedGems:
  Enabled: false

Rails/FilePath:
  Exclude:
    - 'spec/**/*'

# rubocop-rails 2.16 の本 cop は *_like.rb（複合 scope の uniqueness）検査でクラッシュするため無効化。
# 実 DB には (user_id, *_id) の UNIQUE index があり、本来の指摘内容は既に満たしている。
Rails/UniqueValidationWithoutIndex:
  Enabled: false